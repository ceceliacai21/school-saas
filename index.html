<!doctype html>
<html lang="zh-CN">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>教学运营平台</title>
    <link rel="stylesheet" href="styles.css" />
  </head>
  <body>
    <header class="app-header">
      <div class="brand">
        <span class="brand-mark">ED</span>
        <div>
          <strong>教学运营平台</strong>
        </div>
      </div>
      <div class="header-actions">
        <div class="role-control">
          <label for="roleSelect">当前角色</label>
          <select id="roleSelect"></select>
          <small id="roleHint"></small>
        </div>
        <div class="user-chip">
          <span id="userInitial">T</span>
          <div>
            <strong id="userName">林老师</strong>
            <small id="userRoleName">教师</small>
          </div>
        </div>
        <button id="authButton" class="secondary auth-button" type="button">登录</button>
      </div>
    </header>

    <div id="appShell" class="app-shell">
      <aside class="sidebar">
        <nav id="nav" class="nav"></nav>
      </aside>

      <main class="workspace">
        <header class="topbar">
          <div class="page-heading">
            <button id="sidebarToggle" class="sidebar-toggle" type="button" title="收起侧栏" aria-label="收起侧栏" aria-expanded="true">◀</button>
            <div>
            <p class="eyebrow">教育培训公司</p>
            <h1 id="pageTitle">后台管理系统</h1>
            </div>
          </div>
        </header>

        <section id="content" class="content"></section>
      </main>
    </div>

    <template id="emptyStateTemplate">
      <div class="empty-state">
        <strong>暂无数据</strong>
        <span>完成左侧当前流程后，这里会显示记录。</span>
      </div>
    </template>

    <dialog id="authDialog" class="auth-dialog">
      <form id="authForm" class="auth-form">
        <div class="dialog-heading">
          <div>
            <p class="eyebrow">Supabase</p>
            <h2>账号登录</h2>
          </div>
          <button id="closeAuthDialog" class="icon-button" type="button" title="关闭" aria-label="关闭">×</button>
        </div>
        <div class="field">
          <label for="authEmail">邮箱</label>
          <input id="authEmail" name="email" type="email" autocomplete="username" required />
        </div>
        <div class="field">
          <label for="authPassword">密码</label>
          <input id="authPassword" name="password" type="password" autocomplete="current-password" required />
        </div>
        <p id="authError" class="form-error" role="alert"></p>
        <div class="actions"><button class="primary" type="submit">登录</button></div>
      </form>
    </dialog>

    <div id="appNotice" class="app-notice" role="status" aria-live="polite"></div>

    <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
    <script src="supabase-config.js"></script>
    <script src="app.js"></script>
  </body>
</html>
